server:
  port: 8080

spring:
  application:
    name: knot-ai-gateway
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/knot_ai_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  reasonable: true
  helper-dialect: mysql
  default-count: true

springdoc:
  api-docs:
    path: /api/docs/openapi.json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.knot.gateway.controller
  default-flat-param-object: true

