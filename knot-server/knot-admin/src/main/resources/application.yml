server:
  port: 8080

spring:
  application:
    name: knot-ai-gateway
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/knot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: admin
    password: admin
  sql:
    init:
      # 开发可改为 ALWAYS；schema/data 均设计为可重复执行
      mode: ALWAYS
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
      continue-on-error: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  reasonable: true
  helper-dialect: mysql
  default-count: true

# 统一 API 返回包装（对齐 zhy-spring-boot-starter 的 rw 配置）
rw:
  enabled: true
  success-code: 0
  fail-code: 10000
  # true：全部 RestController 返回值包装为 ApiResponse；false：仅 @ResponseWrapper 标注的类/方法
  silent-mode: true
  tags: []

# 供应商/应用凭证库内加密密钥（生产请用环境变量 KNOT_CREDENTIAL_ENCRYPTION_KEY 覆盖）
knot:
  gateway:
    base-url: http://127.0.0.1:9090
  credential:
    encryption-key: ${KNOT_CREDENTIAL_ENCRYPTION_KEY:knot-dev-credential-encryption-key}

springdoc:
  api-docs:
    path: /api/docs/openapi.json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: org.chobit.knot.gateway.controller
  default-flat-param-object: true

