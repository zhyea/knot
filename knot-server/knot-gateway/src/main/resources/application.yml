server:
  port: 9090

spring:
  application:
    name: knot-gateway
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/knot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: admin
    password: admin
  quartz:
    auto-startup: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-} spanId:%X{spanId:-}]"

knot:
  plugin:
    sink:
      kafka:
        enabled: false
        topic-prefix: knot.plugin
        bootstrap-servers: ${KNOT_PLUGIN_KAFKA_BOOTSTRAP_SERVERS:}
